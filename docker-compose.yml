services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: menu-api
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/menu
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: menu-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
